<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <style>
        /* Minimalist Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .countdown-container {
            text-align: center;
        }

        .timer {
            display: flex;
            gap: 2rem;
            font-variant-numeric: tabular-nums;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .number {
            font-size: 4rem;
            font-weight: 200;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 0.5rem;
            color: #666666;
        }

        .message {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #ffffff;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive scaling for smaller screens */
        @media (max-width: 480px) {
            .timer {
                gap: 1rem;
            }
            .number {
                font-size: 2.5rem;
            }
            .label {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <div id="countdown" class="timer">
            <div class="time-segment">
                <span id="days" class="number">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-segment">
                <span id="hours" class="number">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-segment">
                <span id="minutes" class="number">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-segment">
                <span id="seconds" class="number">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>
        <div id="completion-message" class="message" style="display: none;">
            The time has come.
        </div>
    </div>

    <script>
        // Target Date: June 12, 12:12 PM EEST (UTC+3)
        // Expressed as an ISO 8601 string with the +03:00 offset ensures 
        // JavaScript correctly maps it to the exact same global moment for everyone.
        const targetDate = new Date("2026-06-12T12:12:00+03:00").getTime();

        const daysElement = document.getElementById("days");
        const hoursElement = document.getElementById("hours");
        const minutesElement = document.getElementById("minutes");
        const secondsElement = document.getElementById("seconds");
        const countdownElement = document.getElementById("countdown");
        const messageElement = document.getElementById("completion-message");

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                // Clear the interval and display the final state
                clearInterval(intervalId);
                countdownElement.style.display = "none";
                messageElement.style.display = "block";
                return;
            }

            // Time calculations for days, hours, minutes, and seconds
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Pad numbers with leading zeros for visual alignment
            daysElement.innerText = String(days).padStart(2, '0');
            hoursElement.innerText = String(hours).padStart(2, '0');
            minutesElement.innerText = String(minutes).padStart(2, '0');
            secondsElement.innerText = String(seconds).padStart(2, '0');
        }

        // Run immediately on load, then update every second
        updateCountdown();
        const intervalId = setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
